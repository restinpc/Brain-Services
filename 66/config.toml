# Service configuration for vlad_fear_greed_index model.

[service]
id = 66
port = 8928
name = "brain-vlad_fear_greed_index-s66"
text = "Crypto fear-greed sentiment context model"

[rates]
table = "brain_rates_eur_usd"

[cache]
date_from = "2018-02-01"
var_range = [0, 1, 2, 3]
types_range = [0, 1, 2]
shift_window = 30
rebuild_interval = 7200

[dataset]
parser_table = "vlad_fear_greed_index"
enriched_table = "vlad_fear_greed_index_enriched"
index_fields = ["event_type"]
date_field = "date_dt"
engine = "vlad"

[ctx]
key_columns = ["id"]

[ml]
enabled = false
target_precision = 0.95
max_iter = 20
step = 0.10
extremum_limit = 50
