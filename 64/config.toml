# Service configuration for vlad_coingecko_stablecoin_history model.

[service]
id = 64
port = 8926
name = "brain-vlad_coingecko_stablecoin_history-s64"
text = "Stablecoin depeg stress context model"

[rates]
table = "brain_rates_eur_usd"

[cache]
date_from = "2025-03-19"
var_range = [0, 1, 2, 3]
types_range = [0, 1, 2]
shift_window = 30
rebuild_interval = 7200

[dataset]
parser_table = "vlad_coingecko_stablecoin_history"
enriched_table = "vlad_coingecko_stablecoin_history_enriched"
index_fields = ["event_type"]
date_field = "date_dt"
engine = "vlad"

[ctx]
key_columns = ["id"]

[ml]
enabled = false
target_precision = 0.95
max_iter = 20
step = 0.10
extremum_limit = 50
