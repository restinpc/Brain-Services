# Service configuration for sasha_imf_international_reserves model.

[service]
id = 64
port = 8926
name = "brain-sasha_imf_international_reserves-s64"
text = "IMF international reserves context model"

[rates]
table = "brain_rates_eur_usd"

[cache]
date_from = "2025-01-01"
var_range = [0, 1, 2, 3]
types_range = [0, 1, 2]
shift_window = 30
rebuild_interval = 7200

[dataset]
parser_table = "sasha_imf_international_reserves"
enriched_table = "sasha_imf_international_reserves_enriched"
index_fields = ["event_type"]
date_field = "date_dt"
engine = "vlad"

[ctx]
key_columns = ["id"]

[ml]
enabled = false
target_precision = 0.95
max_iter = 20
step = 0.10
extremum_limit = 50
