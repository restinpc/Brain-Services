# Service configuration for sasha_alpha_daily_ethusd_ind model.

[service]
id = 70
port = 8932
name = "brain-sasha_alpha_daily_ethusd_ind-s70"
text = "Alpha Vantage ETHUSD technical-indicator context model"

[cache]
date_from = "2025-01-01"
var_range = [0, 1, 2, 3]
types_range = [0, 1, 2]
shift_window = 30
rebuild_interval = 7200

[dataset]
parser_table = "sasha_alpha_daily_ethusd_ind"
enriched_table = "sasha_alpha_daily_ethusd_ind_enriched"
index_fields = ["event_type"]
date_field = "date_dt"
engine = "vlad"

[ctx]
key_columns = ["id"]

[ml]
enabled = false
target_precision = 0.95
max_iter = 20
step = 0.10
extremum_limit = 50
