# Service configuration for sasha_fred_dgs10 model with ml.

[service]
id = 57
port = 8918
name = "brain-sasha_fred_dgs10-s57-with-ml"
text = "10-Year Treasury yield context model"

[rates]
table = "brain_rates_eur_usd"

[cache]
date_from = "2025-01-15"
var_range = [0, 1, 2, 3]
types_range = [0, 1, 2]
shift_window = 30
rebuild_interval = 7200

[dataset]
parser_table = "sasha_fred_dgs10"
enriched_table = "sasha_fred_dgs10_enriched"
index_fields = ["event_type"]
date_field = "date_dt"
engine = "vlad"

[ctx]
key_columns = ["id"]

[ml]
enabled = true
