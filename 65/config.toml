# Service configuration for vlad_treasury_nominal_yield model.

[service]
id = 65
port = 8927
name = "brain-vlad_treasury_nominal_yield-s65"
text = "Treasury nominal yield curve context model"

[rates]
table = "brain_rates_eur_usd"

[cache]
date_from = "2025-01-01"
var_range = [0, 1, 2, 3]
types_range = [0, 1, 2]
shift_window = 30
rebuild_interval = 7200

[dataset]
parser_table = "vlad_treasury_nominal_yield"
enriched_table = "vlad_treasury_nominal_yield_enriched"
index_fields = ["event_type"]
date_field = "date_dt"
engine = "vlad"

[ctx]
key_columns = ["id"]

[ml]
enabled = false
target_precision = 0.95
max_iter = 20
step = 0.10
extremum_limit = 50

[developer]
email = "samuray15035@gmail.com"